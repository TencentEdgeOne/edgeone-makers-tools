name: Publish to SkillHub

# 触发策略：
# 1. workflow_run — 等 `Build Multi-Platform Output` 在 main 上跑完且成功，再发布。
#    这样可以保证 cursor/ codex/ 自动生成的内容已经合入 main，避免重复触发。
# 2. workflow_dispatch — 手动触发兜底，支持自定义 changelog。
on:
  workflow_run:
    workflows: ["Build Multi-Platform Output"]
    branches: [main]
    types: [completed]
  workflow_dispatch:
    inputs:
      changelog:
        description: 'Changelog (覆盖默认的 commit message)'
        required: false
        type: string

permissions:
  contents: write   # 需要 push 到 skillhub 分支

concurrency:
  group: publish-skillhub
  cancel-in-progress: false   # 发布按队列顺序跑完，不并发

jobs:
  publish:
    # 触发条件：
    #   1. 手动触发：总是允许
    #   2. workflow_run（由 build.yml 触发）：要求 build 成功，且触发 build 的那次
    #      commit 不是 build 自己 push 的 "auto-generate multi-platform output"
    #      commit —— 否则会无限循环触发 publish。
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       !contains(github.event.workflow_run.head_commit.message, 'auto-generate multi-platform output'))

    runs-on: ubuntu-latest

    steps:
      - name: Checkout (full history, pinned to trigger SHA)
        # 关键：workflow_run 默认 checkout 的是 default branch 当前 HEAD，
        # 而不是触发它的那次 commit。如果 publish 排队跑、main 又有新提交，
        # 会拿到不一致的内容。这里显式指定 head_sha 锁定。
        # 手动触发时退化为 main。
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.workflow_run.head_sha || 'main' }}

      - name: Configure git
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Sync main into skillhub
        run: |
          git fetch origin skillhub:skillhub
          git checkout skillhub
          # 把 main 合进来；skillhub 唯一独有的差异是根 SKILL.md 的 frontmatter
          git merge --no-ff main -m "chore(skillhub): sync from main (${GITHUB_SHA::7})"
          git push origin skillhub

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install SkillHub CLI
        run: |
          curl -fsSL https://skillhub.cn/install/install.sh | bash -s -- --cli-only
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Verify CLI
        run: |
          which skillhub
          skillhub --version

      - name: Login to SkillHub
        env:
          SKILLHUB_API_TOKEN: ${{ secrets.SKILLHUB_API_TOKEN }}
        run: |
          skillhub login --key "$SKILLHUB_API_TOKEN" --host https://api.skillhub.cn
          skillhub auth whoami

      - name: Compute version
        # 直接读 _meta.json 顶层 'version' 字段作为本次发布的版本号。
        # 发版规则：编辑 _meta.json 的 version (SemVer)，commit、push 即可。
        # SkillHub 拒绝重复版本号 —— 这就是天然的"忘记 bump"门禁。
        run: |
          VERSION=$(jq -r '.version' _meta.json)
          if [ -z "$VERSION" ] || [ "$VERSION" = "null" ]; then
            echo "::error file=_meta.json::_meta.json 缺少 'version' 字段"
            exit 1
          fi
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "==> Publishing version: $VERSION"

      - name: Prepare publish directory
        # SkillHub 拒绝隐藏文件（如 .gitignore）和未在白名单的扩展名。
        # 按 _meta.json 的 files 字段精确复制需要发布的文件到一个干净目录，
        # 然后用自动版本号覆写 publish 目录里 SKILL.md 和 _meta.json 的 version。
        run: |
          PUBLISH_DIR="$RUNNER_TEMP/skillhub-publish"
          mkdir -p "$PUBLISH_DIR"

          # 1. 复制 _meta.json，并用自动版本号覆写顶层 version
          jq --arg v "$VERSION" '.version = $v' _meta.json > "$PUBLISH_DIR/_meta.json"

          # 2. 按 _meta.json 的 files 列表逐个复制
          jq -r '.files[]' _meta.json | while read -r f; do
            mkdir -p "$PUBLISH_DIR/$(dirname "$f")"
            cp "$f" "$PUBLISH_DIR/$f"
          done

          # 3. 覆写根 SKILL.md frontmatter 里"顶层" version 行（不动 metadata.version）。
          #    用 awk 替换，跨平台兼容（GNU/BSD sed 行为不一致，awk 更稳）。
          if [ -f "$PUBLISH_DIR/SKILL.md" ]; then
            awk -v ver="$VERSION" '
              BEGIN { done = 0 }
              /^version:[[:space:]]/ && !done { print "version: " ver; done = 1; next }
              { print }
            ' "$PUBLISH_DIR/SKILL.md" > "$PUBLISH_DIR/SKILL.md.new"
            mv "$PUBLISH_DIR/SKILL.md.new" "$PUBLISH_DIR/SKILL.md"
          fi

          echo "==> Publish dir contents:"
          find "$PUBLISH_DIR" -type f | sort
          echo ""
          echo "==> Effective _meta.json version:"
          jq '.version' "$PUBLISH_DIR/_meta.json"
          echo ""
          echo "==> Effective SKILL.md frontmatter (first 20 lines):"
          sed -n '1,20p' "$PUBLISH_DIR/SKILL.md"
          echo ""
          echo "==> All 'version:' lines in publish dir (must all be $VERSION at top-level, ignore metadata.version):"
          grep -rn '^version:' "$PUBLISH_DIR" || true

          echo "PUBLISH_DIR=$PUBLISH_DIR" >> "$GITHUB_ENV"

      - name: Sanity check version bump
        # 强校验：publish 目录里 SKILL.md 顶层 version 必须等于 $VERSION，
        # _meta.json 顶层 version 也必须等于 $VERSION。否则立刻失败，
        # 避免发布到一个仍带占位 1.0.0 的产物，浪费 SkillHub 的版本号。
        run: |
          EXPECTED="$VERSION"
          ACTUAL_SKILL=$(awk '/^version:[[:space:]]/ {print $2; exit}' "$PUBLISH_DIR/SKILL.md")
          ACTUAL_META=$(jq -r '.version' "$PUBLISH_DIR/_meta.json")
          echo "Expected:        $EXPECTED"
          echo "SKILL.md actual: $ACTUAL_SKILL"
          echo "_meta.json:      $ACTUAL_META"
          if [ "$ACTUAL_SKILL" != "$EXPECTED" ] || [ "$ACTUAL_META" != "$EXPECTED" ]; then
            echo "::error::Version bump failed — publish dir still has wrong version. Aborting before SkillHub publish."
            echo "----- SKILL.md (first 30 lines) -----"
            sed -n '1,30p' "$PUBLISH_DIR/SKILL.md"
            echo "----- _meta.json (first 10 lines) -----"
            head -n 10 "$PUBLISH_DIR/_meta.json"
            exit 1
          fi
          echo "✓ Version bump OK, ready to publish $EXPECTED"

      - name: Publish (dry-run)
        # --version 显式覆盖 SKILL.md 里的 version（CLI 帮助文档明文：
        # "覆盖 SKILL.md 中的 version"）。这是 SkillHub 真正用来定版本号的入口；
        # publish 目录里 SKILL.md/_meta.json 的 version 字段 CLI 实际不读。
        run: skillhub publish "$PUBLISH_DIR" --version "$VERSION" --dry-run

      - name: Publish
        env:
          # 优先级：手动输入 > 触发 build 的那次 commit message > 默认值
          MANUAL_CHANGELOG: ${{ inputs.changelog }}
          DEFAULT_CHANGELOG: ${{ github.event.workflow_run.head_commit.message }}
        run: |
          CHANGELOG="${MANUAL_CHANGELOG:-${DEFAULT_CHANGELOG:-auto release on $(date +%F)}}"
          # 多行 commit message 只取第一行作为 changelog
          CHANGELOG="$(printf '%s' "$CHANGELOG" | head -n 1)"
          echo "Changelog: $CHANGELOG"
          echo "Version:   $VERSION"
          skillhub publish "$PUBLISH_DIR" \
            --version "$VERSION" \
            --changelog "$CHANGELOG"
